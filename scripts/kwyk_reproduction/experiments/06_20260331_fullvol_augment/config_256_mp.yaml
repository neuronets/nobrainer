# Full 256³ volume — model parallel across 2 GPUs

filters: 96
receptive_field: 37
dropout_rate: 0.25
sigma_init: 0.0001

block_shape: [256, 256, 256]
lr: 0.0001
batch_size: 1
n_classes: 50
label_mapping: 50-class
patches_per_volume: 1

pretrain_epochs: 20
bayesian_epochs: 20
val_dice_freq: 5

n_samples: 10
model_parallel: true

zarr_store: /orcd/scratch/orcd/013/satra/kwyk_reproduction/data/kwyk_500.zarr

datasets:
  - kwyk
split: [80, 10, 10]

variants:
  bwn_multi:
    model: kwyk_meshnet
    dropout_type: bernoulli
    mc_at_inference: true
