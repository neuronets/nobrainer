# KWYK Brain Segmentation Reproduction - Default Configuration
# Based on: McClure et al., Frontiers in Neuroinformatics 2019
#
# The original kwyk study trained 3 model variants, all using
# Variational Weight Normalization (VWN) convolutions:
#   1. bwn       — VWN conv + Bernoulli dropout OFF at inference (MAP)
#   2. bwn_multi — VWN conv + Bernoulli dropout ON at inference (MC)
#   3. bvwn_multi_prior — VWN conv + Concrete dropout (learned rates)

# ---------------------------------------------------------------------------
# Shared architecture (all variants use identical VWN structure)
# ---------------------------------------------------------------------------
filters: 96
receptive_field: 37  # dilation schedule [1,1,1,2,4,8,1]
dropout_rate: 0.25
sigma_init: 0.0001  # initial |kernel_a| for VWN weight sigma

# Training
block_shape: [32, 32, 32]
lr: 0.0001
batch_size: 32  # per-GPU; auto-optimized when GPU available
n_classes: 50   # 50-class FreeSurfer parcellation (matching paper)
label_mapping: 50-class  # uses label_mappings/50-class-mapping.csv

# Class weighting — the original paper used unweighted CrossEntropyLoss.
# Set to "auto" or "median_frequency" for experiments with class balancing.
# Options: null (paper default), "auto" (inverse frequency), "median_frequency"
class_weight_method: null

# Loss function: "cross_entropy" (paper default) or "dice_ce" (Dice + weighted CE)
loss: cross_entropy

# Warm-start (deterministic → VWN)
pretrain_epochs: 50
bayesian_epochs: 50

# Inference
n_samples: 10  # MC inference samples

# Data augmentation (profile: none, light, standard, heavy)
augmentation_profile: standard

# Zarr optimization (optional — convert NIfTI to Zarr for faster I/O)
# zarr_store: null  # path like "data/brain_store.zarr"
# zarr_chunk_shape: [32, 32, 32]

# Stride for patch extraction (null = random, or [sD, sH, sW] for grid)
# stride: null

# Data assembly
datasets:
  - ds000114
  - ds000228
  - ds002609
split: [80, 10, 10]  # train/val/test percentages

# ---------------------------------------------------------------------------
# Model variant configurations (matching original kwyk)
# ---------------------------------------------------------------------------
variants:
  # 1. bwn — VWN conv, Bernoulli dropout, MC OFF at inference (MAP)
  bwn:
    model: kwyk_meshnet
    dropout_type: bernoulli
    mc_at_inference: false
    description: "VWN MeshNet, Bernoulli dropout, deterministic inference (MAP)"

  # 2. bwn_multi — VWN conv, Bernoulli dropout, MC ON at inference
  bwn_multi:
    model: kwyk_meshnet
    dropout_type: bernoulli
    mc_at_inference: true
    description: "VWN MeshNet, MC Bernoulli dropout at inference"

  # 3. bvwn_multi_prior — VWN conv, Concrete dropout (learned per-filter rates)
  bvwn_multi_prior:
    model: kwyk_meshnet
    dropout_type: concrete
    concrete_temperature: 0.02
    concrete_init_p: 0.9
    mc_at_inference: true
    description: "VWN MeshNet, Concrete dropout (learned rates)"

# ---------------------------------------------------------------------------
# Presets for different scales
# ---------------------------------------------------------------------------

# Quick binary brain extraction (for initial testing)
binary_preset:
  n_classes: 2
  label_mapping: binary
  class_weight_method: null

# Smoke test overrides
smoke_test:
  filters: 16
  block_shape: [16, 16, 16]
  pretrain_epochs: 1
  bayesian_epochs: 1
  batch_size: 2
  n_samples: 3
  n_classes: 2
  label_mapping: binary
  class_weight_method: null
