name: CI

on:
  push:
    branches: [main, master, "001-nobrainer-update"]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install \
            ".[bayesian,generative,dev]" \
            monai \
            pyro-ppl

      - name: Test with pytest (CPU, skip GPU)
        run: |
          uv run pytest nobrainer/tests/unit/ -v \
            -m "not gpu" \
            --no-header

  image-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Test CPU Docker image build
        run: |
          docker build -t neuronets/nobrainer:ci-cpu -f docker/cpu.Dockerfile .
