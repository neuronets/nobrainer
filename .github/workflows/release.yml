name: Auto-release on PR merge

on:
  pull_request:
    branches: [master]
    types: [closed]

env:
  AUTO_VERSION: v11.2.1

jobs:
  auto-release:
    runs-on: ubuntu-latest
    # Only run when a PR with the 'release' label is merged (not just closed)
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Unset header
        # checkout adds a header that makes branch protection report errors
        run: git config --local --unset http.https://github.com/.extraheader

      - name: Download auto
        run: |
          auto_download_url="$(curl -fsSL https://api.github.com/repos/intuit/auto/releases/tags/$AUTO_VERSION | jq -r '.assets[] | select(.name == "auto-linux.gz") | .browser_download_url')"
          wget -O- "$auto_download_url" | gunzip > ~/auto
          chmod a+x ~/auto

      - name: Create release
        run: ~/auto shipit -vv
        env:
          GH_TOKEN: ${{ secrets.AUTO_USER_TOKEN }}
